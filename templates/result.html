{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title h5 mb-0">Diagnosis Result</h2>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p>Predicted Disease: <strong>{{ disease }}</strong></p>
                        <p>Confidence Score: <strong>{{ "{:.2%}".format(confidence) }}</strong></p>
                    </div>
                    <div class="col-md-6">
                        <h3 class="h6">Explainability: Model Focus Areas</h3>
                        <img src="{{ url_for('uploaded_file', filename=heatmap) }}" class="img-fluid rounded" alt="Grad-CAM Heatmap">
                    </div>
                </div>
                <div class="mt-4">
                    <a href="{{ url_for('main.upload_diagnosis') }}" class="btn btn-primary">Analyze Another Image</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
