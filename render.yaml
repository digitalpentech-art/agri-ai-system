services:
  - type: web
    name: agri-ai-system
    runtime: python
    buildCommand: "apt-get update && apt-get install -y libjpeg-dev zlib1g-dev && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && pip install tensorflow"
    startCommand: "gunicorn 'run:app'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///database/agri_ai.db
    # Render's ephemeral filesystem means SQLite files in /database/ might be lost.
    # For a production app, a managed PostgreSQL database is recommended.
    # For this prototype, keep it simple.
    preDeployCommand: "python init_db.py"
