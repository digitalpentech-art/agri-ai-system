services:
  - type: web
    name: agri-ai-system
    runtime: python
    buildCommand: "apt-get update && apt-get install -y libjpeg-dev zlib1g-dev && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    preDeployCommand: "mkdir -p database && flask db upgrade && python seed_crops.py && python seed_admin.py"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT run:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_APP
        value: run.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///database/agri_ai.db
